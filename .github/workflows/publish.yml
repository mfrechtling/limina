name: Publish Release

on:
  push:
    tags:
      - "v*"
  
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check
      
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit Tests
        run: cargo test

  build:
    name: Build Release
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package Binary
        run: |
          mkdir -p dist

          tar -czf \
            dist/limina-linux-x86_64.tar.gz \
            -C target/release \
            limina
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: limina-linux-x86_64
          path: dist/

  docker:
    name: Build Docker Image
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t limina:${{ github.ref_name }} .

  release:
    name: Create GitHub Release
    needs:
      - build
      - docker
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Artifacts
        uses: actions/download-artifacts@v4
        with:
          path: dist
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz